<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALFASIS · SAHA EXPO 2026</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f5f6f8;
  margin:0;
}

nav {
  position:fixed;
  top:0;
  width:100%;
  background:#fff;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #ddd;
}

.hero {
  margin-top:80px;
  padding:40px;
}

.btn {
  background:#1b4fff;
  color:#fff;
  padding:12px 20px;
  text-decoration:none;
  display:inline-block;
}

.toast {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px 20px;
  display:none;
}
.toast.show { display:block; }

</style>
</head>

<body>

<nav>
  <div>ALFASIS</div>
  <a href="#meeting">Book</a>
</nav>

<div class="hero">
  <h1>Defense Systems</h1>
  <p>Meet us at SAHA EXPO</p>
  <a class="btn" href="#meeting">Request Meeting</a>
</div>

<div id="meeting" style="padding:40px;">
  <h2>Meeting Form</h2>

  <form id="meetingForm">
    <input type="text" id="name" placeholder="Name" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <button type="submit">Submit</button>
  </form>

  <div id="success" style="display:none;">
    <h3>Success!</h3>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ===== TOAST =====
function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ===== LOCAL STORAGE QUEUE =====
function getQueue(){
  return JSON.parse(localStorage.getItem('queue') || '[]');
}

function saveQueue(q){
  localStorage.setItem('queue', JSON.stringify(q));
}

// ===== RENDER =====
function renderQueue(){
  console.log("Queue:", getQueue());
}

// ===== EXPORT CSV =====
function exportCSV(){
  const data = getQueue();
  if(!data.length){
    showToast("No data");
    return;
  }

  let csv = "Name,Email\n";
  data.forEach(r=>{
    csv += `${r.name},${r.email}\n`;
  });

  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "meetings.csv";
  a.click();
}

// ===== FORM =====
document.getElementById('meetingForm').addEventListener('submit', function(e){
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;

  const queue = getQueue();
  queue.push({
    name,
    email,
    date: new Date().toISOString()
  });

  saveQueue(queue);

  document.getElementById('meetingForm').style.display = "none";
  document.getElementById('success').style.display = "block";

  showToast("Saved locally ✔");
});

// INIT
renderQueue();

</script>

</body>
</html>
